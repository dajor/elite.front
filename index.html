<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite — Browser Remake</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
      #app { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #000; }
      canvas { display: block; width: 100%; height: 100%; background: #000; touch-action: none; outline: none; }
      #hud {
        position: fixed;
        left: 18px;
        bottom: 16px;
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        color: #72dcff;
        font: 600 13px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(114, 220, 255, 0.75);
      }
      #hud span { color: #2d8397; }
      #hud strong { min-width: 72px; font-weight: 700; color: #d9fbff; }
      #combat-hud {
        position: fixed;
        right: 18px;
        bottom: 16px;
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        min-width: 190px;
        color: #72dcff;
        font: 600 13px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(114, 220, 255, 0.75);
      }
      #combat-hud span { color: #2d8397; }
      #combat-hud strong {
        min-width: 78px;
        overflow: hidden;
        color: #d9fbff;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #radar {
        position: relative;
        grid-column: 1 / -1;
        width: 150px;
        height: 150px;
        margin: 8px 0 0 auto;
        border: 1px solid rgba(114, 220, 255, 0.55);
        border-radius: 50%;
        background:
          linear-gradient(rgba(114, 220, 255, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(114, 220, 255, 0.12) 1px, transparent 1px),
          radial-gradient(circle, transparent 0 34%, rgba(114, 220, 255, 0.2) 35%, transparent 36% 68%, rgba(114, 220, 255, 0.24) 69%, transparent 70%),
          rgba(0, 8, 12, 0.42);
        background-size: 100% 100%, 100% 100%, 100% 100%, auto;
        box-shadow: 0 0 18px rgba(25, 184, 220, 0.22);
      }
      #radar b {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 8px;
        height: 8px;
        border: 1px solid rgba(217, 251, 255, 0.9);
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .radar-dot {
        position: absolute;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #72dcff;
        box-shadow: 0 0 9px currentColor;
      }
      .radar-dot.hostile { color: #ff573f; background: #ff573f; }
      .radar-dot.neutral { color: #ffdc55; background: #ffdc55; }
      .radar-dot.targeted {
        width: 11px;
        height: 11px;
        border: 1px solid currentColor;
        background: transparent;
      }
      .radar-dot.dead { display: none; }
      #navigation-hud {
        position: fixed;
        left: 18px;
        top: 16px;
        display: grid;
        grid-template-columns: auto auto;
        gap: 4px 14px;
        min-width: 210px;
        color: #72dcff;
        font: 600 13px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(114, 220, 255, 0.75);
      }
      #navigation-hud span { color: #2d8397; }
      #navigation-hud strong {
        min-width: 94px;
        overflow: hidden;
        color: #d9fbff;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #hyperspace-overlay {
        position: fixed;
        inset: 0;
        z-index: 8;
        opacity: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(90deg, transparent 0 42px, rgba(114, 220, 255, 0.16) 43px 44px, transparent 45px 88px),
          repeating-linear-gradient(0deg, transparent 0 36px, rgba(217, 251, 255, 0.14) 37px 38px, transparent 39px 76px),
          rgba(0, 8, 12, 0.12);
        transform: scaleX(0.08);
        transition: opacity 140ms ease, transform 1.2s ease;
      }
      #hyperspace-overlay.active {
        opacity: 0.9;
        transform: scaleX(1);
      }
      #help-toggle {
        position: fixed;
        top: 16px;
        left: 50%;
        z-index: 7;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(114, 220, 255, 0.65);
        border-radius: 50%;
        color: #d9fbff;
        background: rgba(0, 8, 12, 0.72);
        box-shadow: 0 0 16px rgba(25, 184, 220, 0.24);
        cursor: pointer;
        font: 800 16px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        transform: translateX(-50%);
      }
      #help-toggle:hover,
      #help-toggle[aria-expanded="true"] {
        background: rgba(15, 96, 116, 0.9);
      }
      #help-panel {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 8, 12, 0.68);
        box-sizing: border-box;
      }
      #help-panel[hidden] { display: none; }
      #help-panel article {
        width: min(760px, 100%);
        max-height: calc(100vh - 36px);
        overflow: auto;
        color: #d9fbff;
        background: rgba(0, 8, 12, 0.94);
        border: 1px solid rgba(114, 220, 255, 0.72);
        border-radius: 6px;
        box-shadow: 0 0 26px rgba(25, 184, 220, 0.32);
        font: 600 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      #help-panel header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(114, 220, 255, 0.35);
      }
      #help-panel h2,
      #help-panel h3 {
        margin: 0;
        letter-spacing: 0;
      }
      #help-panel h2 { font-size: 15px; }
      #help-panel h3 {
        color: #72dcff;
        font-size: 13px;
      }
      #help-panel button {
        min-width: 34px;
        border: 1px solid rgba(114, 220, 255, 0.65);
        border-radius: 4px;
        color: #d9fbff;
        background: rgba(5, 42, 52, 0.84);
        font: inherit;
        cursor: pointer;
      }
      #help-panel button:hover { background: rgba(15, 96, 116, 0.9); }
      .help-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 22px;
        padding: 14px;
      }
      .help-grid section {
        display: grid;
        gap: 8px;
        min-width: 0;
      }
      .help-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) minmax(0, 1.25fr);
        gap: 12px;
        align-items: center;
      }
      .help-row kbd {
        min-width: 0;
        overflow-wrap: anywhere;
        color: #d9fbff;
        background: rgba(7, 32, 40, 0.94);
        border: 1px solid rgba(114, 220, 255, 0.38);
        border-radius: 4px;
        padding: 4px 6px;
        font: inherit;
      }
      .help-row span {
        min-width: 0;
        overflow-wrap: anywhere;
        color: #72dcff;
      }
      @media (max-width: 680px) {
        .help-grid { grid-template-columns: 1fr; }
        .help-row { grid-template-columns: 1fr; gap: 4px; }
      }
      #trade-panel {
        position: fixed;
        top: 16px;
        right: 18px;
        width: min(560px, calc(100vw - 36px));
        max-height: calc(100vh - 32px);
        overflow: auto;
        color: #d9fbff;
        background: rgba(0, 8, 12, 0.92);
        border: 1px solid rgba(114, 220, 255, 0.72);
        border-radius: 6px;
        box-shadow: 0 0 22px rgba(25, 184, 220, 0.28);
        font: 600 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      #trade-panel[hidden] { display: none; }
      #trade-panel header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(114, 220, 255, 0.35);
      }
      #trade-panel h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
      .trade-summary {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        color: #72dcff;
      }
      #trade-panel table { width: 100%; border-collapse: collapse; }
      #trade-panel th,
      #trade-panel td {
        padding: 7px 8px;
        border-top: 1px solid rgba(114, 220, 255, 0.12);
        text-align: right;
        white-space: nowrap;
      }
      #trade-panel th:first-child,
      #trade-panel td:first-child { text-align: left; }
      #trade-panel th { color: #2d8397; font-weight: 700; }
      #trade-panel td:last-child {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }
      #trade-panel button {
        min-width: 52px;
        border: 1px solid rgba(114, 220, 255, 0.65);
        border-radius: 4px;
        color: #d9fbff;
        background: rgba(5, 42, 52, 0.84);
        font: inherit;
        cursor: pointer;
      }
      #trade-panel button:disabled {
        color: rgba(217, 251, 255, 0.32);
        border-color: rgba(114, 220, 255, 0.2);
        cursor: default;
      }
      #trade-panel button:not(:disabled):hover { background: rgba(15, 96, 116, 0.9); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
